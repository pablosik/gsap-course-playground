<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scroll Video Demo</title>
    <link rel="stylesheet" href="../../style.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <section id="nextGenGame">
        <div class="wrapper">
          <div class="context">
            <p>GAMES</p>
            <h2>
              <span>Defining the next</span>
              <span>generation of gaming</span>
            </h2>
          </div>

          <video
            id="scrollVideo"
            muted
            playsinline
            preload="auto"
            src="/vd-scroll/video/gg-scroll.mp4"
          ></video>

          <div class="scroll-indicator">
            <p>Scroll to play</p>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./script.js"></script>
  </body>
</html>
